services:
  postgres:
    image: postgres:16
    container_name: supplements_db
    environment:
      POSTGRES_DB: supplements_db
      POSTGRES_USER: supplements_user
      POSTGRES_PASSWORD: supplements_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supplements_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: supplements_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@supplements.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - supplements_network

volumes:
  postgres_data:

networks:
  supplements_network:
    driver: bridge